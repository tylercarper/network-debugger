name: ci

# Runs on PRs (as the merge gate) and on pushes to main (to catch anything that
# lands without a PR, and to give the post-merge signal we monitor).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: static-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          # Without this the cache key never changes and stale deps persist.
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install project
        run: uv sync --all-extras --locked

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Type check (mypy strict)
        run: uv run mypy

      - name: Tests
        run: uv run pytest -q
